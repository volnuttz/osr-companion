<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSR Companion · GM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{cinzel:['Cinzel','serif'],crimson:['Crimson Text','Georgia','serif']}}}}</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
@media(max-width:640px){input,select,textarea{font-size:16px!important;}}
#dm-sidebar{transition:transform 0.3s cubic-bezier(.4,0,.2,1);}
#dm-sidebar.sidebar-closed{transform:translateX(-100%);}
#dm-hamburger-backdrop{transition:opacity 0.3s cubic-bezier(.4,0,.2,1);}
</style>

<!-- SIDEBAR -->
<div id="dm-sidebar" class="sidebar-closed fixed top-0 left-0 bottom-0 z-50 w-full sm:w-80 bg-black shadow-xl flex flex-col font-crimson">
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-800">
    <span class="font-cinzel text-xs font-bold text-gray-400 tracking-widest">MENU</span>
    <button onclick="closeDmHamburger()" aria-label="Close menu" class="w-9 h-9 flex items-center justify-center hover:bg-gray-800 rounded-lg text-gray-400 text-lg leading-none">&times;</button>
  </div>
  <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-5">
    <div>
      <p class="font-cinzel text-xs font-bold text-gray-400 tracking-widest mb-2">SESSION</p>
      <div class="flex items-center gap-2 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2">
        <span class="font-cinzel text-xs text-gray-400">ROOM</span>
        <span id="room-code" class="font-cinzel text-sm font-bold tracking-widest text-white flex-1 select-all">—</span>
        <button onclick="copyCode()" class="font-cinzel text-xs border border-gray-600 px-2 py-0.5 rounded hover:bg-gray-800 text-gray-300">Copy</button>
      </div>
      <p id="peer-status" class="font-cinzel text-xs text-yellow-600 mt-1.5">Connecting…</p>
    </div>
    <!-- GM DASHBOARD SAVE/LOAD -->
    <div class="border-t border-gray-800 pt-3">
      <p class="font-cinzel text-xs font-bold text-gray-400 tracking-widest mb-2">DASHBOARD</p>
      <div class="flex flex-col gap-2">
        <button onclick="downloadGmDashboard()" class="w-full border border-gray-600 bg-gray-900 font-cinzel text-xs text-gray-300 font-bold px-3 py-1.5 rounded hover:bg-gray-800">Download</button>
        <button onclick="uploadGmDashboard()" class="w-full bg-gray-100 text-black font-cinzel text-xs font-bold px-3 py-1.5 rounded hover:bg-gray-200">Upload</button>
      </div>
    </div>
    <div class="border-t border-gray-800 pt-3">
      <a href="player.html" class="font-cinzel text-xs text-gray-400 hover:text-white transition-colors">Player Page</a>
    </div>
  </div>
  <div class="p-5 border-t border-gray-800">
    <img src="Third Party Shadowdark Logo White.png" alt="ShadowDark RPG" class="mx-auto max-h-20 opacity-40">
  </div>
</div>
<!-- Sidebar backdrop -->
<div id="dm-hamburger-backdrop" onclick="closeDmHamburger()" class="hidden fixed inset-0 z-40 bg-black/30"></div>

<div class="min-h-screen bg-gray-50 font-crimson">

  <!-- HEADER -->
  <div class="bg-black text-white sticky top-0 z-30">
    <div class="relative h-12">
      <button id="dm-hamburger-btn" onclick="toggleDmHamburger()" aria-label="Open menu"
        class="absolute left-3 top-1.5 w-9 h-9 flex flex-col items-center justify-center gap-1.5 hover:bg-gray-800 rounded-lg shrink-0">
        <span class="block h-px bg-gray-300" style="width:18px"></span>
        <span class="block h-px bg-gray-300" style="width:18px"></span>
        <span class="block h-px bg-gray-300" style="width:18px"></span>
      </button>
      <span class="font-cinzel font-bold text-sm tracking-widest absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">GM DASHBOARD</span>
      <span id="conn-count" class="font-cinzel text-xs text-gray-400 absolute right-3 top-1/2 -translate-y-1/2">0 players</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="bg-white border-b border-gray-200 sticky top-[44px] z-20 overflow-x-auto">
    <div class="max-w-2xl mx-auto flex gap-0">
      <button onclick="showTab('combat')" id="tbtn-combat" class="tab-btn font-cinzel text-xs py-2.5 px-4 whitespace-nowrap border-b-2 border-black text-black tab-active">BATTLEFIELD</button>
      <button onclick="showTab('treasure')" id="tbtn-treasure" class="tab-btn font-cinzel text-xs py-2.5 px-4 whitespace-nowrap border-b-2 border-transparent text-gray-400 hover:text-gray-600">TREASURES</button>
      <button onclick="showTab('shop')" id="tbtn-shop" class="tab-btn font-cinzel text-xs py-2.5 px-4 whitespace-nowrap border-b-2 border-transparent text-gray-400 hover:text-gray-600">SHOPS</button>
      <button onclick="showTab('notes')" id="tbtn-notes" class="tab-btn font-cinzel text-xs py-2.5 px-4 whitespace-nowrap border-b-2 border-transparent text-gray-400 hover:text-gray-600">NOTES</button>
    </div>
  </div>

  <!-- TAB CONTENT -->
  <div class="max-w-2xl mx-auto p-3 pb-12">

    <!-- ── BATTLEFIELD ── -->
    <div id="tab-combat">
      <div class="mt-1">
        <div id="initiative-list" class="mb-3"></div>
        <button onclick="openCombatantModal()" class="w-full border border-dashed border-gray-300 rounded-xl font-cinzel text-xs text-gray-400 font-bold py-3 hover:bg-gray-50 mt-2">+ Add Combatant</button>
      </div>
    </div>

    <!-- Add Combatant Modal -->
    <div id="combatant-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div onclick="closeCombatantModal()" class="absolute inset-0 bg-black/40"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-3 p-4">
        <div class="flex items-center justify-between mb-3">
          <p class="font-cinzel text-xs font-bold text-gray-500 tracking-widest">ADD COMBATANT</p>
          <button onclick="closeCombatantModal()" class="w-7 h-7 flex items-center justify-center hover:bg-gray-100 rounded-lg text-gray-400 text-lg leading-none">&times;</button>
        </div>
        <div class="mb-2">
          <input id="npc-name" type="text" placeholder="Name…" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none font-crimson">
        </div>
        <div class="mb-2">
          <p class="font-cinzel text-xs text-gray-400 mb-1">DESCRIPTION</p>
          <textarea id="npc-desc" placeholder="Rotting skeleton, hollow eye sockets…" rows="2" class="w-full border border-gray-200 rounded px-2 py-1 text-sm outline-none font-crimson resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div>
            <p class="font-cinzel text-xs text-gray-400 mb-1">MAX HP</p>
            <input id="npc-hp" type="number" placeholder="10" class="w-full border border-gray-200 rounded px-2 py-1 text-sm outline-none text-center">
          </div>
          <div>
            <p class="font-cinzel text-xs text-gray-400 mb-1">AC</p>
            <input id="npc-ac" type="number" placeholder="12" class="w-full border border-gray-200 rounded px-2 py-1 text-sm outline-none text-center">
          </div>
        </div>
        <div class="mb-3">
          <p class="font-cinzel text-xs text-gray-400 mb-1">ATTACKS</p>
          <input id="npc-attacks" type="text" placeholder="Claw +2 (1d6), Bite +1 (1d4)…" class="w-full border border-gray-200 rounded px-2 py-1 text-sm outline-none font-crimson">
        </div>
        <button onclick="addCombatant()" class="w-full bg-black text-white font-cinzel text-xs font-bold py-2.5 rounded-lg hover:bg-gray-800 tracking-widest">ADD TO BATTLEFIELD</button>
      </div>
    </div>

    <!-- ── TREASURES ── -->
    <div id="tab-treasure" style="display:none">
      <div class="mt-1">
        <div class="border border-gray-200 rounded-xl p-3 mb-3">
          <span class="bg-black text-white font-cinzel text-xs font-bold tracking-widest px-2 py-0.5 rounded inline-block mb-3">LOOT</span>
          <div id="treasure-items"></div>
          <div class="flex gap-1.5 mt-2">
            <button onclick="addTreasureItem('item')" class="border border-gray-200 rounded font-cinzel text-xs text-gray-400 font-bold px-3 py-1 hover:bg-gray-50">+ Item</button>
            <button onclick="addTreasureItem('currency')" class="border border-gray-200 rounded font-cinzel text-xs text-gray-400 font-bold px-3 py-1 hover:bg-gray-50">+ Currency</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── SHOP ── -->
    <div id="tab-shop" style="display:none">
      <div class="mt-1">
        <div id="shops-container"></div>
        <button onclick="openShopModal()" class="w-full border border-dashed border-gray-300 rounded-xl font-cinzel text-xs text-gray-400 font-bold py-3 hover:bg-gray-50 mt-2">+ Add Shop</button>
      </div>
    </div>

    <!-- Shop Name Modal -->
    <div id="shop-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div onclick="closeShopModal()" class="absolute inset-0 bg-black/40"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-3 p-4">
        <div class="flex items-center justify-between mb-3">
          <p class="font-cinzel text-xs font-bold text-gray-500 tracking-widest">NEW SHOP</p>
          <button onclick="closeShopModal()" class="w-7 h-7 flex items-center justify-center hover:bg-gray-100 rounded-lg text-gray-400 text-lg leading-none">&times;</button>
        </div>
        <div class="mb-3">
          <input id="new-shop-name" type="text" placeholder="The Iron Anvil…" class="w-full border border-gray-200 rounded px-2 py-1.5 text-sm outline-none font-crimson">
        </div>
        <button onclick="confirmAddShop()" class="w-full bg-black text-white font-cinzel text-xs font-bold py-2.5 rounded-lg hover:bg-gray-800 tracking-widest">CREATE SHOP</button>
      </div>
    </div>

    <!-- Character Sheet Modal -->
    <div id="character-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div onclick="closeCharacterModal()" class="absolute inset-0 bg-black/40"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-3 p-4 max-h-[80vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
          <p class="font-cinzel text-sm font-bold text-gray-700 tracking-widest">CHARACTER SHEET</p>
          <button onclick="closeCharacterModal()" class="w-7 h-7 flex items-center justify-center hover:bg-gray-100 rounded-lg text-gray-400 text-lg leading-none">&times;</button>
        </div>
        <div id="character-content">
          <!-- Content will be populated by JavaScript -->
        </div>
      </div>
    </div>

    <!-- Timer Finished Modal -->
    <div id="timer-finished-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
      <div onclick="closeTimerFinishedModal()" class="absolute inset-0 bg-black/40"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-3 p-6 text-center">
        <div class="mb-4">
          <p class="font-cinzel text-lg font-bold text-gray-800 tracking-widest">TORCH FINISHED</p>
          <p class="font-cinzel text-sm text-gray-600 mt-2">Your 1-hour timer has completed!</p>
        </div>
        <button onclick="closeTimerFinishedModal()" class="w-full bg-black text-white font-cinzel text-sm font-bold py-3 rounded-lg hover:bg-gray-800 tracking-widest">OK</button>
      </div>
    </div>

    <!-- ── NOTES ── -->
    <div id="tab-notes" style="display:none">
      <div class="mt-1">
        <textarea id="dm-notes" oninput="saveNotes()" placeholder="Session notes, encounters, secret doors, NPC names…" class="w-full h-96 border border-gray-200 rounded-xl p-3 text-sm outline-none resize-none font-crimson leading-relaxed"></textarea>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-black text-white font-cinzel text-xs font-bold tracking-widest px-4 py-2 rounded-full shadow-lg transition-opacity duration-500 opacity-0 pointer-events-none z-50"></div>

<!-- DICE MSG -->
<div id="dice-msg" class="fixed top-4 left-1/2 -translate-x-1/2 bg-black text-white font-cinzel text-sm font-bold tracking-widest px-5 py-2 rounded-full shadow-lg transition-opacity duration-500 opacity-0 pointer-events-none z-50"></div>

<!-- FAB SPEED DIAL -->
<div id="fab-container" class="fixed bottom-6 right-4 sm:bottom-6 sm:right-5 flex flex-col items-end gap-2 z-40" style="bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem))">
  <div id="fab-items" class="flex flex-col items-end gap-2 mb-1" style="display:none!important;">
    <button onclick="quickRoll('1d4');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d4</button>
    <button onclick="quickRoll('1d6');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d6</button>
    <button onclick="quickRoll('1d8');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d8</button>
    <button onclick="quickRoll('1d10');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d10</button>
    <button onclick="quickRoll('1d12');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d12</button>
    <button onclick="quickRoll('1d20');toggleFab()" class="w-10 h-10 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800">d20</button>
  </div>
  <!-- Persistent Timer Button -->
  <button onclick="startTimer()" class="h-10 px-3 bg-black text-white font-cinzel text-xs font-bold rounded-full shadow-lg hover:bg-gray-800 whitespace-nowrap">
    <span id="timer-display">Torch</span>
  </button>
  <!-- Main FAB -->
  <button id="fab-main" onclick="toggleFab()" class="w-14 h-14 bg-black text-white rounded-full shadow-xl flex items-center justify-center text-xl hover:bg-gray-800 transition-transform duration-200">&#9858;</button>
</div>

<script>
// ── HAMBURGER MENU ────────────────────────────────────────────────────
function toggleDmHamburger(){
  var menu=document.getElementById('dm-sidebar');
  var backdrop=document.getElementById('dm-hamburger-backdrop');
  if(menu.classList.contains('sidebar-closed')){
    menu.classList.remove('sidebar-closed');
    backdrop.classList.remove('hidden');
  } else { closeDmHamburger(); }
}
function closeDmHamburger(){
  document.getElementById('dm-sidebar').classList.add('sidebar-closed');
  document.getElementById('dm-hamburger-backdrop').classList.add('hidden');
}

// ── UTILS ─────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(function(){el.style.opacity='0';},2200);
}

// ── TABS ──────────────────────────────────────────────────────────────
var TABS=['combat','treasure','shop','notes'];
function showTab(name){
  TABS.forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
    var btn=document.getElementById('tbtn-'+t);
    if(t===name){btn.classList.add('border-black','text-black');btn.classList.remove('border-transparent','text-gray-400','hover:text-gray-600');}
    else{btn.classList.remove('border-black','text-black');btn.classList.add('border-transparent','text-gray-400','hover:text-gray-600');}
  });
}

// ── PEERJS ────────────────────────────────────────────────────────────
var peer=null;
var connections={};
var players={};

function initPeer(){
  peer=new Peer();
  peer.on('open',function(id){
    document.getElementById('room-code').textContent=id;
    document.getElementById('peer-status').textContent='Ready';
    document.getElementById('peer-status').className='font-cinzel text-xs text-green-400 ml-auto';
  });
  peer.on('connection',function(conn){
    conn.on('open',function(){
      connections[conn.peer]=conn;
      conn.on('data',function(data){handleMsg(conn.peer,data);});
      conn.on('close',function(){
        var name=players[conn.peer]?players[conn.peer].name:'A player';
        delete players[conn.peer]; delete connections[conn.peer];
        updateConnCount(); updateTargetSelects();
        toast(name+' disconnected');
      });
    });
  });
  peer.on('error',function(err){
    document.getElementById('peer-status').textContent='Error — retrying…';
    document.getElementById('peer-status').className='font-cinzel text-xs text-red-400 ml-auto';
    try{peer.destroy();}catch(e){}
    setTimeout(initPeer,4000);
  });
}

function handleMsg(pid,data){
  if(data.type==='join'){
    players[pid]={
      name:data.name||'Unknown',
      ancestry:data.ancestry||'',
      cls:data.cls||'',
      level:data.level||'',
      title:data.title||'',
      alignment:data.alignment||'',
      background:data.background||'',
      deity:data.deity||'',
      abilities:data.abilities||{},
      talents:data.talents||[],
      attacks:data.attacks||[],
      spells:data.spells||[],
      gear:data.gear||[],
      freeCarry:data.freeCarry||[],
      gp:data.gp||0,
      sp:data.sp||0,
      cp:data.cp||0,
      hp:parseInt(data.hp)||0,
      hpMax:parseInt(data.hpMax)||0,
      ac:parseInt(data.ac)||0
    };
    updateConnCount(); updateTargetSelects();
    // Auto-add to battlefield
    if(!combatants.find(function(c){return c.peerId===pid;})){
      var p=players[pid];
      combatants.push({id:nextId++,name:p.name,desc:'',hp:p.hp,hpMax:p.hpMax,ac:p.ac,attacks:'',peerId:pid});
      renderCombat();
    }
    toast((players[pid].name||'A player')+' joined the session');
  }
  if(data.type==='hp_sync'&&players[pid]){
    players[pid].hp=parseInt(data.hp)||0;
    players[pid].hpMax=parseInt(data.hpMax)||0;
    syncCombatantFromPlayer(pid,players[pid].hp,players[pid].hpMax);
  }
  if(data.type==='sell_rejected'){
    toast((players[pid]?players[pid].name:'Player')+': '+data.reason+' for "'+data.item+'"');
  }
}

function send(pid,msg){if(connections[pid])try{connections[pid].send(msg);}catch(e){}}
function broadcast(msg){Object.keys(connections).forEach(function(pid){send(pid,msg);});}

function copyCode(){
  var code=document.getElementById('room-code').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(code).then(function(){toast('Room code copied!');});}
  else{var ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Room code copied!');}
}

function updateConnCount(){
  var n=Object.keys(players).length;
  document.getElementById('conn-count').textContent=n+(n===1?' player':' players');
}

function updateTargetSelects(){
  renderTreasure();
  renderAllShops();
}

// ── PLAYER HP SYNC ───────────────────────────────────────────────────
function setHp(pid,val){
  if(!players[pid])return;
  players[pid].hp=Math.max(0,val);
  send(pid,{type:'set_hp',hp:players[pid].hp});
  syncCombatantFromPlayer(pid,players[pid].hp,players[pid].hpMax);
}
function setHpMax(pid,val){
  if(!players[pid])return;
  players[pid].hpMax=Math.max(0,val);
  send(pid,{type:'set_hp_max',hpMax:players[pid].hpMax});
}
function adjHp(pid,delta){if(players[pid])setHp(pid,players[pid].hp+delta);}

// ── COMBAT TAB ────────────────────────────────────────────────────────
var combatants=[];
var nextId=1;
var dragSrcIdx=null;

function openCombatantModal(){
  document.getElementById('combatant-modal').classList.remove('hidden');
  setTimeout(function(){document.getElementById('npc-name').focus();},50);
}
function closeCombatantModal(){
  document.getElementById('combatant-modal').classList.add('hidden');
}

function addCombatant(){
  var name=document.getElementById('npc-name').value.trim();
  if(!name){toast('Enter a name');return;}
  var desc=document.getElementById('npc-desc').value.trim();
  var hp=parseInt(document.getElementById('npc-hp').value)||10;
  var ac=parseInt(document.getElementById('npc-ac').value)||10;
  var attacks=document.getElementById('npc-attacks').value.trim();
  combatants.push({id:nextId++,name:name,desc:desc,hp:hp,hpMax:hp,ac:ac,attacks:attacks,peerId:null});
  document.getElementById('npc-name').value='';
  document.getElementById('npc-desc').value='';
  document.getElementById('npc-hp').value='';
  document.getElementById('npc-ac').value='';
  document.getElementById('npc-attacks').value='';
  closeCombatantModal();
  renderCombat();saveDashboard();
}


function syncCombatantFromPlayer(pid,hp,hpMax){
  var c=combatants.find(function(c){return c.peerId===pid;});
  if(c){c.hp=hp;c.hpMax=hpMax;renderCombat();}
}

function adjCombatHp(id,delta){
  var c=combatants.find(function(c){return c.id===id;});
  if(!c)return;
  c.hp=Math.max(0,c.hp+delta);
  if(c.peerId&&players[c.peerId]){players[c.peerId].hp=c.hp;send(c.peerId,{type:'set_hp',hp:c.hp});}
  renderCombat();saveDashboard();
}

function setCombatHp(id,val){
  var c=combatants.find(function(c){return c.id===id;});
  if(!c)return;
  c.hp=Math.max(0,parseInt(val)||0);
  if(c.peerId&&players[c.peerId]){players[c.peerId].hp=c.hp;send(c.peerId,{type:'set_hp',hp:c.hp});}
  renderCombat();saveDashboard();
}

function removeCombatant(id){
  combatants=combatants.filter(function(c){return c.id!==id;});
  renderCombat();saveDashboard();
}

function clearCombat(){if(confirm('Clear all combatants?')){combatants=[];renderCombat();saveDashboard();}}

// Drag-and-drop reordering
function onDragStart(e){
  dragSrcIdx=+e.currentTarget.dataset.idx;
  e.currentTarget.style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  var card=e.currentTarget;
  card.classList.add('border-black','border-2');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('border-black','border-2');
}
function onDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('border-black','border-2');
  var destIdx=+e.currentTarget.dataset.idx;
  if(dragSrcIdx!==null&&dragSrcIdx!==destIdx){
    var moved=combatants.splice(dragSrcIdx,1)[0];
    combatants.splice(destIdx,0,moved);
    renderCombat();saveDashboard();
  }
  dragSrcIdx=null;
}
function onDragEnd(e){e.currentTarget.style.opacity='1';dragSrcIdx=null;}

// Touch drag-and-drop
var touchDragEl=null,touchClone=null,touchSrcIdx=null,touchStartY=0,touchMoved=false;
function onTouchStart(e){
  touchSrcIdx=+e.currentTarget.dataset.idx;
  touchStartY=e.touches[0].clientY;
  touchMoved=false;
  touchDragEl=e.currentTarget;
}
function onTouchMove(e){
  if(touchDragEl===null)return;
  var dy=Math.abs(e.touches[0].clientY-touchStartY);
  if(!touchMoved&&dy>10){
    touchMoved=true;
    touchClone=touchDragEl.cloneNode(true);
    touchClone.style.cssText='position:fixed;z-index:999;pointer-events:none;opacity:0.8;width:'+touchDragEl.offsetWidth+'px;';
    document.body.appendChild(touchClone);
    touchDragEl.style.opacity='0.3';
  }
  if(touchMoved&&touchClone){
    e.preventDefault();
    touchClone.style.top=(e.touches[0].clientY-30)+'px';
    touchClone.style.left=touchDragEl.getBoundingClientRect().left+'px';
  }
}
function onTouchEnd(e){
  if(touchMoved&&touchDragEl!==null){
    var endY=e.changedTouches[0].clientY;
    var cards=document.querySelectorAll('[data-idx]');
    var destIdx=touchSrcIdx;
    cards.forEach(function(card){
      var r=card.getBoundingClientRect();
      if(endY>=r.top&&endY<=r.bottom) destIdx=+card.dataset.idx;
    });
    if(touchSrcIdx!==destIdx){
      var moved=combatants.splice(touchSrcIdx,1)[0];
      combatants.splice(destIdx,0,moved);
      renderCombat();saveDashboard();
    }
    touchDragEl.style.opacity='1';
  }
  if(touchClone){touchClone.remove();touchClone=null;}
  touchDragEl=null;touchSrcIdx=null;touchMoved=false;
}

// ── TREASURE TAB ──────────────────────────────────────────────────────
var tItems=[];
var tNextId=1;

function addTreasureItem(kind){
  if(kind==='currency') tItems.push({id:tNextId++,kind:'currency',amount:0,currency:'gp',target:'all'});
  else tItems.push({id:tNextId++,kind:'item',val:'',target:'all'});
  renderTreasure();saveDashboard();
}
function removeTreasureItem(id){
  tItems=tItems.filter(function(x){return x.id!==id;});
  renderTreasure();saveDashboard();
}
function setTreasureItem(id,field,val){
  var x=tItems.find(function(x){return x.id===id;});
  if(x)x[field]=(field==='amount'?(parseInt(val)||0):val);
  saveDashboard();
}
function sendTreasureItem(id){
  var x=tItems.find(function(x){return x.id===id;});
  if(!x)return;
  var msg;
  if(x.kind==='currency'){
    if(!x.amount){toast('Enter an amount');return;}
    msg={type:'treasure',items:[],gp:0,sp:0,cp:0};
    msg[x.currency]=x.amount;
    var label=x.amount+' '+x.currency.toUpperCase();
  } else {
    if(!x.val){toast('Enter an item name');return;}
    msg={type:'treasure',items:[x.val],gp:0,sp:0,cp:0};
    var label='"'+x.val+'"';
  }
  if(x.target==='all')broadcast(msg); else send(x.target,msg);
  toast('Sent '+label+'!');
  tItems=tItems.filter(function(t){return t.id!==id;});
  renderTreasure();saveDashboard();
}
function renderTreasure(){
  var playerOpts='<option value="all">All</option>';
  Object.keys(players).forEach(function(pid){
    playerOpts+='<option value="'+pid+'">'+esc(players[pid].name)+'</option>';
  });
  document.getElementById('treasure-items').innerHTML=tItems.map(function(x){
    var opts=playerOpts.replace('value="'+x.target+'"','value="'+x.target+'" selected');
    if(x.kind==='currency'){
      return '<div class="flex items-center gap-1.5 border-b border-gray-100 py-1.5">'+
        '<input type="number" placeholder="0" value="'+(x.amount||'')+'" oninput="setTreasureItem('+x.id+',\'amount\',this.value)" class="w-14 border-b border-gray-300 text-center text-sm outline-none">'+
        '<select onchange="setTreasureItem('+x.id+',\'currency\',this.value)" class="text-xs outline-none bg-white border border-gray-200 rounded px-1 py-0.5">'+
          '<option value="gp"'+(x.currency==='gp'?' selected':'')+'>GP</option>'+
          '<option value="sp"'+(x.currency==='sp'?' selected':'')+'>SP</option>'+
          '<option value="cp"'+(x.currency==='cp'?' selected':'')+'>CP</option>'+
        '</select>'+
        '<select onchange="setTreasureItem('+x.id+',\'target\',this.value)" class="text-xs outline-none bg-white border border-gray-200 rounded px-1 py-0.5 font-crimson ml-auto">'+opts+'</select>'+
        '<button onclick="sendTreasureItem('+x.id+')" class="bg-black text-white font-cinzel text-xs px-2 py-0.5 rounded hover:bg-gray-700 whitespace-nowrap">Send</button>'+
        '<button onclick="removeTreasureItem('+x.id+')" class="text-gray-300 hover:text-gray-500 text-sm px-1">&#x2715;</button>'+
      '</div>';
    }
    return '<div class="flex items-center gap-1.5 border-b border-gray-100 py-1.5">'+
      '<input type="text" placeholder="Item name…" value="'+esc(x.val)+'" oninput="setTreasureItem('+x.id+',\'val\',this.value)" class="flex-1 text-sm outline-none font-crimson min-w-0">'+
      '<select onchange="setTreasureItem('+x.id+',\'target\',this.value)" class="text-xs outline-none bg-white border border-gray-200 rounded px-1 py-0.5 font-crimson">'+opts+'</select>'+
      '<button onclick="sendTreasureItem('+x.id+')" class="bg-black text-white font-cinzel text-xs px-2 py-0.5 rounded hover:bg-gray-700 whitespace-nowrap">Send</button>'+
      '<button onclick="removeTreasureItem('+x.id+')" class="text-gray-300 hover:text-gray-500 text-sm px-1">&#x2715;</button>'+
    '</div>';
  }).join('');
}

// ── SHOP TAB ─────────────────────────────────────────────────────────
var shops=[];
var shopNextId=1;
var sItemNextId=1;

function openShopModal(){
  document.getElementById('shop-modal').classList.remove('hidden');
  document.getElementById('new-shop-name').value='';
  setTimeout(function(){document.getElementById('new-shop-name').focus();},50);
}
function closeShopModal(){
  document.getElementById('shop-modal').classList.add('hidden');
}
function confirmAddShop(){
  var name=document.getElementById('new-shop-name').value.trim();
  if(!name){toast('Enter a shop name');return;}
  shops.push({id:shopNextId++,name:name,items:[],target:''});
  closeShopModal();
  renderAllShops();saveDashboard();
}
function removeShop(shopId){
  shops=shops.filter(function(s){return s.id!==shopId;});
  renderAllShops();saveDashboard();
}
function setShopName(shopId,val){
  var s=shops.find(function(s){return s.id===shopId;});
  if(s)s.name=val;
  saveDashboard();
}
function setShopTarget(shopId,val){
  var s=shops.find(function(s){return s.id===shopId;});
  if(s)s.target=val;
  saveDashboard();
}
function addShopItem(shopId){
  var s=shops.find(function(s){return s.id===shopId;});
  if(s){s.items.push({id:sItemNextId++,name:'',price:0,currency:'gp'});renderAllShops();saveDashboard();}
}
function removeShopItem(shopId,itemId){
  var s=shops.find(function(s){return s.id===shopId;});
  if(s){s.items=s.items.filter(function(x){return x.id!==itemId;});renderAllShops();saveDashboard();}
}
function setShopItem(shopId,itemId,field,val){
  var s=shops.find(function(s){return s.id===shopId;});
  if(!s)return;
  var x=s.items.find(function(x){return x.id===itemId;});
  if(x)x[field]=(field==='price'?(parseInt(val)||0):val);
  saveDashboard();
}
function sellItem(shopId,itemId){
  var s=shops.find(function(s){return s.id===shopId;});
  if(!s)return;
  var x=s.items.find(function(x){return x.id===itemId;});
  if(!x||!x.name){toast('Item has no name');return;}
  var pid=s.target;
  if(!pid){toast('Select a player first');return;}
  if(!connections[pid]){toast('Player not connected');return;}
  send(pid,{type:'sell_item',item:x.name,price:x.price,currency:x.currency});
  toast('Sold "'+x.name+'" to '+(players[pid]?players[pid].name:'player'));
}
function renderAllShops(){
  var container=document.getElementById('shops-container');
  if(!shops.length){
    container.innerHTML='<p class="text-center text-xs text-gray-400 font-cinzel py-8">No shops yet. Add one below.</p>';
    return;
  }
  container.innerHTML=shops.map(function(s){
    var playerOpts='<option value="">— select player —</option>';
    Object.keys(players).forEach(function(pid){
      playerOpts+='<option value="'+pid+'"'+(s.target===pid?' selected':'')+'>'+esc(players[pid].name)+'</option>';
    });
    var itemsHtml=s.items.map(function(x){
      return '<div class="flex items-center gap-1.5 border-b border-gray-100 py-1.5">'+
        '<input type="text" placeholder="Item…" value="'+esc(x.name)+'" oninput="setShopItem('+s.id+','+x.id+',\'name\',this.value)" class="flex-1 text-sm outline-none font-crimson min-w-0">'+
        '<input type="number" placeholder="0" value="'+(x.price||'')+'" oninput="setShopItem('+s.id+','+x.id+',\'price\',this.value)" class="w-12 border-b border-gray-300 text-center text-sm outline-none">'+
        '<select onchange="setShopItem('+s.id+','+x.id+',\'currency\',this.value)" class="text-xs outline-none bg-white border border-gray-200 rounded px-1 py-0.5">'+
          '<option value="gp"'+(x.currency==='gp'?' selected':'')+'>GP</option>'+
          '<option value="sp"'+(x.currency==='sp'?' selected':'')+'>SP</option>'+
          '<option value="cp"'+(x.currency==='cp'?' selected':'')+'>CP</option>'+
        '</select>'+
        '<button onclick="sellItem('+s.id+','+x.id+')" class="bg-black text-white font-cinzel text-xs px-2 py-0.5 rounded hover:bg-gray-700 whitespace-nowrap">Sell</button>'+
        '<button onclick="removeShopItem('+s.id+','+x.id+')" class="text-gray-300 hover:text-gray-500 text-sm px-1">&#x2715;</button>'+
      '</div>';
    }).join('');
    return '<div class="border border-gray-200 rounded-xl p-3 mb-3">'+
      '<div class="flex items-center justify-between mb-3">'+
        '<span class="font-cinzel text-sm font-bold tracking-wide">'+esc(s.name)+'</span>'+
        '<button onclick="removeShop('+s.id+')" class="text-gray-300 hover:text-gray-500 text-sm px-1">&#x2715;</button>'+
      '</div>'+
      '<div class="flex gap-2 items-center mb-3">'+
        '<p class="font-cinzel text-xs font-bold text-gray-500 shrink-0">SELL TO</p>'+
        '<select onchange="setShopTarget('+s.id+',this.value)" class="flex-1 border border-gray-200 rounded px-2 py-1.5 text-sm outline-none bg-white font-crimson">'+playerOpts+'</select>'+
      '</div>'+
      '<div>'+itemsHtml+'</div>'+
      '<button onclick="addShopItem('+s.id+')" class="border border-gray-200 rounded font-cinzel text-xs text-gray-400 font-bold px-3 py-1 hover:bg-gray-50 mt-2">+ Add Item</button>'+
    '</div>';
  }).join('');
}

// ── SAVE / LOAD ──────────────────────────────────────────────────────
var DM_SAVE='dm_dashboard';

function saveDashboard(){
  var npcCombatants=combatants.filter(function(c){return !c.peerId;}).map(function(c){
    return {id:c.id,name:c.name,desc:c.desc,hp:c.hp,hpMax:c.hpMax,ac:c.ac,attacks:c.attacks};
  });
  var data={
    notes:document.getElementById('dm-notes').value,
    combatants:npcCombatants,
    nextId:nextId,
    treasures:tItems,
    tNextId:tNextId,
    shops:shops,
    shopNextId:shopNextId,
    sItemNextId:sItemNextId
  };
  localStorage.setItem(DM_SAVE,JSON.stringify(data));
}

function loadDashboard(){
  var data=JSON.parse(localStorage.getItem(DM_SAVE)||'{}');
  if(data.notes)document.getElementById('dm-notes').value=data.notes;
  if(data.combatants){combatants=data.combatants.map(function(c){c.peerId=null;return c;});}
  if(data.nextId)nextId=data.nextId;
  if(data.treasures){tItems=data.treasures;}
  if(data.tNextId)tNextId=data.tNextId;
  if(data.shops){shops=data.shops;}
  if(data.shopNextId)shopNextId=data.shopNextId;
  if(data.sItemNextId)sItemNextId=data.sItemNextId;
  renderCombat();renderTreasure();renderAllShops();
}

function saveNotes(){saveDashboard();}

function showCharacterSheet(peerId){

      '<div class="font-cinzel text-xs font-bold text-gray-500 mb-2">ATTACKS</div>' +
      '<div class="space-y-2">';

      '<div class="font-cinzel text-xs font-bold text-gray-500 mb-2">SPELLS</div>' +

var fabOpen = false;
function toggleFab() {
  fabOpen = !fabOpen;
  var items = document.getElementById('fab-items');
  var btn = document.getElementById('fab-main');
  items.style.cssText = fabOpen ? 'display:flex;flex-direction:column;align-items:flex-end;gap:8px;margin-bottom:4px;' : 'display:none!important;';
}

function d(sides) { return Math.floor(Math.random() * sides) + 1; }

function quickRoll(expr) {
  var parts = expr.match(/(\d+)d(\d+)/i);
  if (!parts) return;
  var n = parseInt(parts[1]), s = parseInt(parts[2]);
  var rolls = [], total = 0;
  for (var i = 0; i < n; i++) { var r = d(s); rolls.push(r); total += r; }
  var label = 'd' + s + ' = ' + total;
  var msg = document.getElementById('dice-msg');
  msg.textContent = label;
  msg.style.opacity = '1';
  clearTimeout(msg._t);
  msg._t = setTimeout(function() { msg.style.opacity = '0'; }, 1800);
}

var timerInterval = null;
var timerSeconds = 0;

function startTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timer-display').textContent = 'Torch';
    return;
  }
  timerSeconds = 3600; // 1 hour
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerSeconds--;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      document.getElementById('timer-display').textContent = 'Done!';
      document.getElementById('timer-finished-modal').classList.remove('hidden');
      setTimeout(function() {
        document.getElementById('timer-display').textContent = 'Torch';
      }, 3000);
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function updateTimerDisplay() {
  var mins = Math.floor(timerSeconds / 60);
  var secs = timerSeconds % 60;
  document.getElementById('timer-display').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
}

// ── GM DASHBOARD EXPORT/IMPORT ──────────────────────────────────────
function downloadGmDashboard() {
  var npcCombatants = combatants.filter(function(c) { return !c.peerId; }).map(function(c) {
    return { id: c.id, name: c.name, desc: c.desc, hp: c.hp, hpMax: c.hpMax, ac: c.ac, attacks: c.attacks };
  });
  var data = {
    notes: document.getElementById('dm-notes').value,
    combatants: npcCombatants,
    nextId: nextId,
    treasures: tItems,
    tNextId: tNextId,
    shops: shops,
    shopNextId: shopNextId,
    sItemNextId: sItemNextId
  };
  var timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
  var filename = 'gm_dashboard_' + timestamp + '.json';
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeDmHamburger();
  toast('Dashboard saved: ' + filename);
}

function uploadGmDashboard() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(event) {
      try {
        var data = JSON.parse(event.target.result);
        
        // Restore all data
        if (data.notes) document.getElementById('dm-notes').value = data.notes;
        if (data.combatants) {
          combatants = data.combatants.map(function(c) { c.peerId = null; return c; });
        }
        if (data.nextId) nextId = data.nextId;
        if (data.treasures) tItems = data.treasures;
        if (data.tNextId) tNextId = data.tNextId;
        if (data.shops) shops = data.shops;
        if (data.shopNextId) shopNextId = data.shopNextId;
        if (data.sItemNextId) sItemNextId = data.sItemNextId;
        
        // Re-render all sections
        renderCombat();
        renderTreasure();
        renderAllShops();
        
        closeDmHamburger();
        toast('Dashboard loaded: ' + file.name);
      } catch(err) {
        toast('Invalid dashboard file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
